<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-box { fill: #f8f9fa; stroke: #2c3e50; stroke-width: 2; }
      .primary-table { fill: #e3f2fd; stroke: #1976d2; stroke-width: 3; }
      .table-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .field-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .pk-field { fill: #e74c3c; font-weight: bold; }
      .fk-field { fill: #3498db; }
      .relation-line { stroke: #7f8c8d; stroke-width: 2; fill: none; }
      .relation-arrow { fill: #7f8c8d; }
    </style>
  </defs>
  
  <!-- Título -->
  <text x="600" y="30" text-anchor="middle" class="table-title" style="font-size: 18px;">
    Sistema de Botica - Estructura de Base de Datos
  </text>
  
  <!-- Tabla PRODUCTOS (Principal) -->
  <rect x="450" y="60" width="300" height="280" class="primary-table"/>
  <text x="600" y="80" text-anchor="middle" class="table-title">PRODUCTOS</text>
  <line x1="450" y1="90" x2="750" y2="90" stroke="#1976d2" stroke-width="2"/>
  
  <text x="460" y="110" class="field-text pk-field">• id (PK)</text>
  <text x="460" y="125" class="field-text">• nombre</text>
  <text x="460" y="140" class="field-text">• codigo_barras (UNIQUE)</text>
  <text x="460" y="155" class="field-text">• concentracion</text>
  <text x="460" y="170" class="field-text">• marca</text>
  <text x="460" y="185" class="field-text">• lote</text>
  <text x="460" y="200" class="field-text">• categoria</text>
  <text x="460" y="215" class="field-text fk-field">• categoria_id (FK)</text>
  <text x="460" y="230" class="field-text">• presentacion</text>
  <text x="460" y="245" class="field-text fk-field">• presentacion_id (FK)</text>
  <text x="460" y="260" class="field-text">• stock_actual, stock_minimo</text>
  <text x="460" y="275" class="field-text">• precio_compra, precio_venta</text>
  <text x="460" y="290" class="field-text">• fecha_vencimiento</text>
  <text x="460" y="305" class="field-text">• ubicacion, estado, imagen</text>
  <text x="460" y="320" class="field-text">• timestamps</text>
  
  <!-- Tabla CATEGORIAS -->
  <rect x="50" y="120" width="200" height="120" class="table-box"/>
  <text x="150" y="140" text-anchor="middle" class="table-title">CATEGORIAS</text>
  <line x1="50" y1="150" x2="250" y2="150" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="60" y="170" class="field-text pk-field">• id (PK)</text>
  <text x="60" y="185" class="field-text">• nombre (UNIQUE)</text>
  <text x="60" y="200" class="field-text">• descripcion</text>
  <text x="60" y="215" class="field-text">• timestamps</text>
  
  <!-- Tabla PRESENTACIONES -->
  <rect x="50" y="280" width="200" height="120" class="table-box"/>
  <text x="150" y="300" text-anchor="middle" class="table-title">PRESENTACIONES</text>
  <line x1="50" y1="310" x2="250" y2="310" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="60" y="330" class="field-text pk-field">• id (PK)</text>
  <text x="60" y="345" class="field-text">• nombre</text>
  <text x="60" y="360" class="field-text">• descripcion</text>
  <text x="60" y="375" class="field-text">• timestamps</text>
  
  <!-- Tabla VENTAS -->
  <rect x="850" y="60" width="250" height="200" class="table-box"/>
  <text x="975" y="80" text-anchor="middle" class="table-title">VENTAS</text>
  <line x1="850" y1="90" x2="1100" y2="90" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="860" y="110" class="field-text pk-field">• id (PK)</text>
  <text x="860" y="125" class="field-text">• numero_venta</text>
  <text x="860" y="140" class="field-text fk-field">• cliente_id (FK)</text>
  <text x="860" y="155" class="field-text fk-field">• usuario_id (FK)</text>
  <text x="860" y="170" class="field-text">• tipo_comprobante</text>
  <text x="860" y="185" class="field-text">• subtotal, igv, total</text>
  <text x="860" y="200" class="field-text">• metodo_pago</text>
  <text x="860" y="215" class="field-text">• estado, fecha_venta</text>
  <text x="860" y="230" class="field-text">• timestamps</text>
  
  <!-- Tabla VENTA_DETALLES -->
  <rect x="850" y="300" width="250" height="140" class="table-box"/>
  <text x="975" y="320" text-anchor="middle" class="table-title">VENTA_DETALLES</text>
  <line x1="850" y1="330" x2="1100" y2="330" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="860" y="350" class="field-text pk-field">• id (PK)</text>
  <text x="860" y="365" class="field-text fk-field">• venta_id (FK)</text>
  <text x="860" y="380" class="field-text fk-field">• producto_id (FK)</text>
  <text x="860" y="395" class="field-text">• cantidad</text>
  <text x="860" y="410" class="field-text">• precio_unitario, subtotal</text>
  <text x="860" y="425" class="field-text">• timestamps</text>
  
  <!-- Tabla CLIENTES -->
  <rect x="850" y="480" width="250" height="160" class="table-box"/>
  <text x="975" y="500" text-anchor="middle" class="table-title">CLIENTES</text>
  <line x1="850" y1="510" x2="1100" y2="510" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="860" y="530" class="field-text pk-field">• id (PK)</text>
  <text x="860" y="545" class="field-text">• dni (UNIQUE)</text>
  <text x="860" y="560" class="field-text">• nombres, apellidos</text>
  <text x="860" y="575" class="field-text">• telefono, email</text>
  <text x="860" y="590" class="field-text">• direccion</text>
  <text x="860" y="605" class="field-text">• activo, timestamps</text>
  
  <!-- Tabla ESTANTES -->
  <rect x="50" y="450" width="200" height="120" class="table-box"/>
  <text x="150" y="470" text-anchor="middle" class="table-title">ESTANTES</text>
  <line x1="50" y1="480" x2="250" y2="480" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="60" y="500" class="field-text pk-field">• id (PK)</text>
  <text x="60" y="515" class="field-text">• nombre, codigo</text>
  <text x="60" y="530" class="field-text">• descripcion</text>
  <text x="60" y="545" class="field-text">• activo, timestamps</text>
  
  <!-- Tabla UBICACIONES -->
  <rect x="300" y="450" width="200" height="140" class="table-box"/>
  <text x="400" y="470" text-anchor="middle" class="table-title">UBICACIONES</text>
  <line x1="300" y1="480" x2="500" y2="480" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="310" y="500" class="field-text pk-field">• id (PK)</text>
  <text x="310" y="515" class="field-text fk-field">• estante_id (FK)</text>
  <text x="310" y="530" class="field-text">• nombre, codigo</text>
  <text x="310" y="545" class="field-text">• capacidad_maxima</text>
  <text x="310" y="560" class="field-text">• nivel, posicion</text>
  <text x="310" y="575" class="field-text">• activo, timestamps</text>
  
  <!-- Relaciones -->
  <!-- Categorias -> Productos -->
  <path d="M 250 180 Q 350 180 450 215" class="relation-line"/>
  <polygon points="445,213 455,215 445,217" class="relation-arrow"/>
  
  <!-- Presentaciones -> Productos -->
  <path d="M 250 340 Q 350 340 450 245" class="relation-line"/>
  <polygon points="445,243 455,245 445,247" class="relation-arrow"/>
  
  <!-- Productos -> Venta_Detalles -->
  <path d="M 750 200 Q 800 200 850 380" class="relation-line"/>
  <polygon points="845,378 855,380 845,382" class="relation-arrow"/>
  
  <!-- Ventas -> Venta_Detalles -->
  <line x1="975" y1="260" x2="975" y2="300" class="relation-line"/>
  <polygon points="973,295 975,305 977,295" class="relation-arrow"/>
  
  <!-- Clientes -> Ventas -->
  <path d="M 975 480 Q 975 400 975 260" class="relation-line"/>
  <polygon points="973,265 975,255 977,265" class="relation-arrow"/>
  
  <!-- Estantes -> Ubicaciones -->
  <line x1="250" y1="510" x2="300" y2="515" class="relation-line"/>
  <polygon points="295,513 305,515 295,517" class="relation-arrow"/>
  
  <!-- Leyenda -->
  <rect x="50" y="650" width="300" height="120" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1"/>
  <text x="200" y="670" text-anchor="middle" class="table-title">LEYENDA</text>
  <line x1="50" y1="680" x2="350" y2="680" stroke="#2c3e50" stroke-width="1"/>
  
  <text x="60" y="700" class="field-text pk-field">• PK = Primary Key (Clave Primaria)</text>
  <text x="60" y="715" class="field-text fk-field">• FK = Foreign Key (Clave Foránea)</text>
  <text x="60" y="730" class="field-text">• UNIQUE = Campo único</text>
  <text x="60" y="745" class="field-text">• Las líneas muestran relaciones</text>
  
  <!-- Características destacadas -->
  <rect x="400" y="650" width="400" height="120" fill="#e8f5e8" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="670" text-anchor="middle" class="table-title" style="fill: #27ae60;">CARACTERÍSTICAS DESTACADAS</text>
  <line x1="400" y1="680" x2="800" y2="680" stroke="#27ae60" stroke-width="1"/>
  
  <text x="410" y="700" class="field-text">✓ Eliminación de fecha_fabricacion (campo innecesario)</text>
  <text x="410" y="715" class="field-text">✓ Relaciones correctas con categorías y presentaciones</text>
  <text x="410" y="730" class="field-text">✓ Índices optimizados para consultas rápidas</text>
  <text x="410" y="745" class="field-text">✓ Integridad referencial con ON DELETE SET NULL</text>
  
</svg>